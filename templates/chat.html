{% extends "base.html" %}

{% block content %}
<div class="chat-layout">
    <!-- Sidebar -->
    <div class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </div>
        
        <!-- Topics Section -->
        <div class="sidebar-section">
            <h5 class="section-title">Suggested Topics</h5>
            <div id="topics-list" class="topics-list">
                <!-- Topics will be loaded here -->
            </div>
        </div>
        
        <!-- AI Personas Section -->
        <div class="sidebar-section">
            <h5 class="section-title">AI Personas</h5>
            <div class="accordion" id="personasAccordion">
                <!-- Spiritual & Wisdom -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#spiritualPersonas">
                            Spiritual & Wisdom
                        </button>
                    </h2>
                    <div id="spiritualPersonas" class="accordion-collapse collapse show">
                        <div class="accordion-body">
                            <div class="persona-list">
                                <button class="persona-btn" data-role="Ori Sage">Ori Sage</button>
                                <button class="persona-btn" data-role="Zen Master Kōan">Zen Master Kōan</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Technology & Science -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#techPersonas">
                            Technology & Science
                        </button>
                    </h2>
                    <div id="techPersonas" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="persona-list">
                                <button class="persona-btn" data-role="Techno Sage">Techno Sage</button>
                                <button class="persona-btn" data-role="Quantum Observer">Quantum Observer</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Cultural & Narrative -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#culturalPersonas">
                            Cultural & Narrative
                        </button>
                    </h2>
                    <div id="culturalPersonas" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="persona-list">
                                <button class="persona-btn" data-role="Musa the Storyweaver">Musa</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Philosophy & Ethics -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#philosophyPersonas">
                            Philosophy & Ethics
                        </button>
                    </h2>
                    <div id="philosophyPersonas" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="persona-list">
                                <button class="persona-btn" data-role="Existential Explorer">Existential Explorer</button>
                                <button class="persona-btn" data-role="Ethics Guardian">Ethics Guardian</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Future & Vision -->
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#futurePersonas">
                            Future & Vision
                        </button>
                    </h2>
                    <div id="futurePersonas" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="persona-list">
                                <button class="persona-btn" data-role="Kara the Visionary Dreamer">Kara</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-main">
        <!-- Messages Container -->
        <div class="messages-container" id="chat-messages">
            <!-- Messages will be loaded here -->
        </div>
        
        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="message-input" class="form-control" rows="1" placeholder="Type your message..."></textarea>
                <button id="send-message" class="btn btn-primary">
                    <i class="bi bi-send"></i>
                </button>
            </div>
            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
