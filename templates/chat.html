{% extends "base.html" %}

{% block content %}
<div class="chat-container">
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">AI Personas</h5>
                </div>
                <div class="card-body">
                    <div class="list-group">
                        <button class="list-group-item list-group-item-action" data-role="Ori Sage">Ori Sage</button>
                        <button class="list-group-item list-group-item-action" data-role="Techno Sage">Techno Sage</button>
                        <button class="list-group-item list-group-item-action" data-role="Musa the Storyweaver">Musa</button>
                        <button class="list-group-item list-group-item-action" data-role="Kara the Visionary Dreamer">Kara</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Dialogue</h5>
                </div>
                <div class="card-body">
                    <div id="chat-messages" class="chat-messages mb-3"></div>
                    <div class="input-group">
                        <input type="text" id="message-input" class="form-control" placeholder="Type your message...">
                        <button id="send-message" class="btn btn-primary">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
