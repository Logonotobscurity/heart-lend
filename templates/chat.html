{% extends "base.html" %}

{% block content %}
<div class="chat-layout">
    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="personas-scroll">
            <div class="personas-row">
                <!-- Spiritual & Wisdom -->
                <div class="persona-chip" data-role="Ori Sage">
                    <i class="bi bi-brightness-high"></i>
                    <span>Ori Sage</span>
                </div>
                <div class="persona-chip" data-role="Zen Master Kōan">
                    <i class="bi bi-circle-half"></i>
                    <span>Zen Master</span>
                </div>
                
                <!-- Technology & Science -->
                <div class="persona-chip" data-role="Techno Sage">
                    <i class="bi bi-cpu"></i>
                    <span>Techno Sage</span>
                </div>
                <div class="persona-chip" data-role="Quantum Observer">
                    <i class="bi bi-asterisk"></i>
                    <span>Quantum Observer</span>
                </div>
                
                <!-- Cultural & Narrative -->
                <div class="persona-chip" data-role="Musa the Storyweaver">
                    <i class="bi bi-book"></i>
                    <span>Musa</span>
                </div>
                
                <!-- Philosophy & Ethics -->
                <div class="persona-chip" data-role="Existential Explorer">
                    <i class="bi bi-question-diamond"></i>
                    <span>Explorer</span>
                </div>
                <div class="persona-chip" data-role="Ethics Guardian">
                    <i class="bi bi-shield"></i>
                    <span>Ethics Guardian</span>
                </div>
                
                <!-- Future & Vision -->
                <div class="persona-chip" data-role="Kara the Visionary Dreamer">
                    <i class="bi bi-stars"></i>
                    <span>Kara</span>
                </div>
            </div>
        </div>
        
        <!-- Active Topics -->
        <div class="topics-scroll">
            <div class="topics-row" id="active-topics">
                <!-- Active topics will be added here -->
            </div>
        </div>
    </div>

    <!-- Desktop Sidebar -->
    <div class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </div>
        
        <!-- Topics Section -->
        <div class="sidebar-section">
            <h5 class="section-title">Suggested Topics</h5>
            <div id="topics-list" class="topics-list">
                <!-- Topics will be loaded here -->
            </div>
        </div>
        
        <!-- AI Personas Section -->
        <div class="sidebar-section personas-section">
            <h5 class="section-title">AI Personas</h5>
            <div class="personas-grid">
                <!-- Existing persona cards -->
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-main">
        <!-- Messages Container -->
        <div class="messages-container" id="chat-messages">
            <!-- Messages will be loaded here -->
        </div>
        
        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="message-input" class="form-control" rows="1" placeholder="Type your message..."></textarea>
                <button id="send-message" class="btn btn-primary">
                    <i class="bi bi-send"></i>
                </button>
            </div>
            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
