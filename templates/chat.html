{% extends "base.html" %}

{% block content %}
<div class="chat-layout">
    <!-- Desktop Fixed Sidebar Toggle -->
    <button class="sidebar-toggle-fixed" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <!-- Horizontal Persona Selector -->
    <div class="persona-selector">
        <div class="personas-scroll">
            <div class="personas-row">
                <!-- Spiritual & Wisdom -->
                <div class="persona-card" data-role="Ori Sage" data-category="spiritual">
                    <div class="persona-avatar">
                        <i class="bi bi-brightness-high"></i>
                    </div>
                    <span class="persona-name">Ori Sage</span>
                </div>
                <div class="persona-card" data-role="Zen Master Kōan" data-category="spiritual">
                    <div class="persona-avatar">
                        <i class="bi bi-circle-half"></i>
                    </div>
                    <span class="persona-name">Zen Master</span>
                </div>
                
                <!-- Technology & Science -->
                <div class="persona-card" data-role="Techno Sage" data-category="tech">
                    <div class="persona-avatar">
                        <i class="bi bi-cpu"></i>
                    </div>
                    <span class="persona-name">Techno Sage</span>
                </div>
                <div class="persona-card" data-role="Quantum Observer" data-category="tech">
                    <div class="persona-avatar">
                        <i class="bi bi-asterisk"></i>
                    </div>
                    <span class="persona-name">Quantum Observer</span>
                </div>
                
                <!-- Cultural & Narrative -->
                <div class="persona-card" data-role="Musa the Storyweaver" data-category="cultural">
                    <div class="persona-avatar">
                        <i class="bi bi-book"></i>
                    </div>
                    <span class="persona-name">Musa</span>
                </div>
                
                <!-- Philosophy & Ethics -->
                <div class="persona-card" data-role="Existential Explorer" data-category="philosophy">
                    <div class="persona-avatar">
                        <i class="bi bi-question-diamond"></i>
                    </div>
                    <span class="persona-name">Explorer</span>
                </div>
                <div class="persona-card" data-role="Ethics Guardian" data-category="philosophy">
                    <div class="persona-avatar">
                        <i class="bi bi-shield"></i>
                    </div>
                    <span class="persona-name">Ethics Guardian</span>
                </div>
                
                <!-- Future & Vision -->
                <div class="persona-card" data-role="Kara the Visionary Dreamer" data-category="future">
                    <div class="persona-avatar">
                        <i class="bi bi-stars"></i>
                    </div>
                    <span class="persona-name">Kara</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Desktop Sidebar -->
    <div class="chat-sidebar" id="chatSidebar">
        <!-- Topics Section -->
        <div class="sidebar-section">
            <h5 class="section-title">Suggested Topics</h5>
            <div id="topics-list" class="topics-list">
                <!-- Topics will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-main">
        <!-- Active Topics -->
        <div class="active-topics">
            <div class="topics-scroll">
                <div class="topics-row" id="active-topics">
                    <!-- Active topics will be added here -->
                </div>
            </div>
        </div>

        <!-- Messages Container -->
        <div class="messages-container" id="chat-messages">
            <!-- Messages will be loaded here -->
        </div>
        
        <!-- Input Area -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="message-input" class="form-control" rows="1" placeholder="Type your message..."></textarea>
                <button id="send-message" class="btn btn-primary">
                    <i class="bi bi-send"></i>
                </button>
            </div>
            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
