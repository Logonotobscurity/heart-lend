{% extends "base.html" %}

{% block content %}
<div class="chat-container">
    <div class="row">
        <div class="col-md-3">
            <div class="card mb-3">
                <div class="card-header">
                    <h5 class="card-title mb-0">Suggested Topics</h5>
                </div>
                <div class="card-body">
                    <div id="topics-list" class="list-group">
                        <!-- Topics will be loaded here -->
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">AI Personas</h5>
                </div>
                <div class="card-body">
                    <div class="accordion" id="personasAccordion">
                        <!-- Spiritual & Wisdom -->
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#spiritualPersonas">
                                    Spiritual & Wisdom
                                </button>
                            </h2>
                            <div id="spiritualPersonas" class="accordion-collapse collapse show">
                                <div class="accordion-body">
                                    <div class="list-group">
                                        <button class="list-group-item list-group-item-action" data-role="Ori Sage">Ori Sage</button>
                                        <button class="list-group-item list-group-item-action" data-role="Zen Master Kōan">Zen Master Kōan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Technology & Science -->
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#techPersonas">
                                    Technology & Science
                                </button>
                            </h2>
                            <div id="techPersonas" class="accordion-collapse collapse">
                                <div class="accordion-body">
                                    <div class="list-group">
                                        <button class="list-group-item list-group-item-action" data-role="Techno Sage">Techno Sage</button>
                                        <button class="list-group-item list-group-item-action" data-role="Quantum Observer">Quantum Observer</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Cultural & Narrative -->
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#culturalPersonas">
                                    Cultural & Narrative
                                </button>
                            </h2>
                            <div id="culturalPersonas" class="accordion-collapse collapse">
                                <div class="accordion-body">
                                    <div class="list-group">
                                        <button class="list-group-item list-group-item-action" data-role="Musa the Storyweaver">Musa</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Philosophy & Ethics -->
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#philosophyPersonas">
                                    Philosophy & Ethics
                                </button>
                            </h2>
                            <div id="philosophyPersonas" class="accordion-collapse collapse">
                                <div class="accordion-body">
                                    <div class="list-group">
                                        <button class="list-group-item list-group-item-action" data-role="Existential Explorer">Existential Explorer</button>
                                        <button class="list-group-item list-group-item-action" data-role="Ethics Guardian">Ethics Guardian</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Future & Vision -->
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#futurePersonas">
                                    Future & Vision
                                </button>
                            </h2>
                            <div id="futurePersonas" class="accordion-collapse collapse">
                                <div class="accordion-body">
                                    <div class="list-group">
                                        <button class="list-group-item list-group-item-action" data-role="Kara the Visionary Dreamer">Kara</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-9">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Dialogue</h5>
                </div>
                <div class="card-body">
                    <div id="chat-messages" class="chat-messages mb-3"></div>
                    <div class="input-group">
                        <input type="text" id="message-input" class="form-control" placeholder="Type your message...">
                        <button id="send-message" class="btn btn-primary">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
{% endblock %}
